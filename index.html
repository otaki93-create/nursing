<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薬剤検索ノート — 看護学生のための治療薬リファレンス</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="薬剤ノート">
<meta name="theme-color" content="#FF6B6B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFBF2;
    --surface:#FFFFFF;
    --ink:#2E2A24;
    --ink-soft:#8B8377;
    --line:#F1E7D8;
    --grad1:#FFB13C;
    --grad2:#FF6B6B;
    --grad3:#FF7EB6;
    --focus:#4C6EF5;
    --shadow: 0 8px 24px rgba(255,107,107,0.14);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 4%, rgba(255,177,60,0.10), transparent 40%),
      radial-gradient(circle at 95% 12%, rgba(76,110,245,0.08), transparent 35%),
      var(--bg);
    color:var(--ink);
    font-family:"M PLUS Rounded 1c","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    line-height:1.65;
    min-height:100vh;
  }

  .app{
    max-width:1080px;
    margin:0 auto;
    padding:20px 18px 60px;
  }

  /* Header */
  header.top{
    background:linear-gradient(135deg, var(--grad1), var(--grad2) 55%, var(--grad3));
    border-radius:28px;
    padding:26px 24px 24px;
    color:#fff;
    box-shadow:0 14px 30px rgba(255,107,107,0.28);
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"💊";
    position:absolute;
    right:-6px;
    bottom:-24px;
    font-size:120px;
    opacity:0.18;
    transform:rotate(-12deg);
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.16em;
    font-weight:800;
    opacity:0.9;
  }
  h1{
    font-family:"Zen Maru Gothic","M PLUS Rounded 1c",sans-serif;
    font-size:clamp(26px,5vw,36px);
    margin:6px 0 6px;
    font-weight:900;
    letter-spacing:.01em;
  }
  .sub{
    opacity:0.95;
    font-size:13.5px;
    font-weight:500;
    max-width:520px;
  }

  /* Search */
  .search-row{
    display:flex;
    gap:10px;
    margin:18px 0 14px;
    position:sticky;
    top:10px;
    z-index:10;
  }
  .search-box{
    position:relative;
    flex:1;
  }
  .search-box input{
    width:100%;
    padding:15px 18px 15px 46px;
    font-size:15px;
    border:none;
    border-radius:20px;
    background:var(--surface);
    color:var(--ink);
    font-family:inherit;
    font-weight:500;
    box-shadow:var(--shadow);
  }
  .search-box input::placeholder{ color:var(--ink-soft); }
  .search-box input:focus{
    outline:3px solid var(--focus);
    outline-offset:1px;
  }
  .search-box svg{
    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);
    width:18px;
    height:18px;
    stroke:var(--grad2);
    stroke-width:2.6;
  }
  .result-count{
    font-size:13px;
    font-weight:700;
    color:#fff;
    background:var(--grad2);
    white-space:nowrap;
    align-self:center;
    padding:8px 14px;
    border-radius:14px;
    box-shadow:var(--shadow);
  }

  /* Category filter chips */
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:4px 0 22px;
    position:sticky;
    top:70px;
    background:linear-gradient(var(--bg), var(--bg) 85%, transparent);
    padding:8px 0 14px;
    z-index:9;
  }
  .chip{
    border:none;
    background:var(--surface);
    color:var(--ink);
    padding:9px 16px 9px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease, color .12s ease;
    white-space:nowrap;
    box-shadow:0 3px 10px rgba(46,42,36,0.08);
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .chip:hover{ transform:translateY(-1px); }
  .chip:focus-visible{ outline:3px solid var(--focus); outline-offset:2px; }
  .chip.active{
    background:var(--chip-color, var(--grad2));
    color:#fff;
    box-shadow:0 6px 16px color-mix(in srgb, var(--chip-color, var(--grad2)) 50%, transparent);
  }

  /* Grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:12px;
  }
  .card{
    position:relative;
    background:var(--surface);
    border:none;
    border-radius:20px;
    padding:16px 14px 14px;
    cursor:pointer;
    text-align:left;
    font-family:inherit;
    color:var(--ink);
    overflow:hidden;
    box-shadow:0 4px 14px rgba(46,42,36,0.07);
    transition:transform .14s ease, box-shadow .14s ease;
  }
  .card:hover{
    transform:translateY(-4px) scale(1.015);
    box-shadow:0 12px 24px rgba(46,42,36,0.14);
  }
  .card:focus-visible{
    outline:3px solid var(--focus);
    outline-offset:2px;
  }
  .card .emoji-badge{
    width:40px;
    height:40px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    background:var(--tag-tint, #FFF1E8);
    margin-bottom:10px;
  }
  .card .cat-label{
    font-size:10.5px;
    font-weight:800;
    letter-spacing:.04em;
    color:var(--tag-color,#999);
    margin-bottom:4px;
  }
  .card .name-ja{
    font-family:"Zen Maru Gothic","M PLUS Rounded 1c",sans-serif;
    font-size:16.5px;
    font-weight:700;
    margin-bottom:2px;
    line-height:1.3;
  }
  .card .brand{
    font-size:11.5px;
    color:var(--ink-soft);
    font-weight:500;
  }

  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
    background:var(--surface);
    border-radius:20px;
    box-shadow:0 4px 14px rgba(46,42,36,0.07);
  }
  .empty-state .big-emoji{ font-size:44px; display:block; margin-bottom:10px; }
  .empty-state strong{ display:block; color:var(--ink); margin-bottom:6px; font-size:15px;}

  /* Modal */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(46,42,36,0.45);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:5vh 16px;
    z-index:50;
    overflow-y:auto;
  }
  .overlay.open{ display:flex; }
  .sheet{
    background:var(--surface);
    max-width:620px;
    width:100%;
    border-radius:28px;
    border:none;
    padding:0;
    position:relative;
    animation:rise .18s ease;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(46,42,36,0.30);
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .sheet-head{
    padding:26px 26px 20px;
    position:relative;
    background:linear-gradient(135deg, var(--tag-color,#999), color-mix(in srgb, var(--tag-color,#999) 60%, #fff));
    color:#fff;
  }
  .sheet-head .big-emoji{
    font-size:38px;
    display:block;
    margin-bottom:8px;
  }
  .close-btn{
    position:absolute;
    top:18px;
    right:18px;
    width:34px;
    height:34px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.3);
    color:#fff;
    cursor:pointer;
    font-size:16px;
    line-height:1;
    font-weight:700;
  }
  .close-btn:hover{ background:rgba(255,255,255,0.5); }
  .close-btn:focus-visible{ outline:3px solid #fff; outline-offset:2px;}
  .sheet-head .cat-label{
    font-size:11px;
    font-weight:800;
    letter-spacing:.05em;
    opacity:0.95;
    margin-bottom:6px;
  }
  .sheet-head .name-ja{
    font-family:"Zen Maru Gothic","M PLUS Rounded 1c",sans-serif;
    font-size:25px;
    font-weight:900;
    margin-bottom:4px;
    padding-right:36px;
  }
  .sheet-head .brand{ opacity:0.95; font-size:13.5px; font-weight:500; }
  .sheet-head .classification-tag{
    display:inline-block;
    margin-top:12px;
    font-size:12.5px;
    font-weight:700;
    background:rgba(255,255,255,0.25);
    border-radius:999px;
    padding:5px 14px;
  }

  .sheet-body{ padding:10px 26px 26px; }
  .section{
    padding:16px 0;
    border-bottom:1px dashed var(--line);
  }
  .section:last-child{ border-bottom:none; }
  .section h3{
    font-size:13px;
    letter-spacing:.03em;
    color:var(--ink);
    margin:0 0 8px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .section p{ margin:0; font-size:14.5px; }
  .section ul{ margin:4px 0 0; padding-left:20px; font-size:14.5px; }
  .section li{ margin-bottom:4px; }

  .dosage-box{
    font-family:"SF Mono",Menlo,monospace;
    font-size:13px;
    background:#FFF6E9;
    border:none;
    border-radius:14px;
    padding:12px 16px;
    white-space:pre-wrap;
  }

  .nursing-box{
    background:#EFFBF1;
    border:none;
    border-radius:18px;
    padding:16px 18px;
    margin-top:4px;
  }
  .nursing-box h4{
    font-size:12.5px;
    margin:0 0 8px;
    color:#2F9E44;
    letter-spacing:.02em;
    font-weight:800;
  }
  .nursing-box h4:not(:first-child){ margin-top:14px; }
  .nursing-box ul{ margin:2px 0 0; padding-left:18px; font-size:14px; }
  .nursing-box li{ margin-bottom:5px; }

  .side-effects{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .side-effects span{
    background:#FFF0F3;
    color:#E8590C;
    border:none;
    border-radius:999px;
    padding:5px 12px;
    font-size:12.5px;
    font-weight:700;
  }

  footer.disclaimer{
    margin-top:36px;
    padding:16px 18px;
    background:var(--surface);
    border-radius:18px;
    font-size:12px;
    color:var(--ink-soft);
    box-shadow:0 4px 14px rgba(46,42,36,0.06);
  }

  @media (max-width:520px){
    .search-row{ flex-direction:column; align-items:stretch; }
    .result-count{ align-self:flex-start; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <span class="eyebrow">NURSING PHARMACOLOGY REFERENCE</span>
    <h1>薬剤検索ノート 💊</h1>
    <span class="sub">看護学生のための治療薬リファレンス — 薬品名・分類・適応から楽しく検索!</span>
  </header>

  <div class="search-row">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input id="searchInput" type="text" placeholder="薬品名・分類・適応疾患で検索してみよう" autocomplete="off">
    </div>
    <div class="result-count" id="resultCount"></div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="grid" id="grid"></div>

  <footer class="disclaimer">
    本アプリは学習・復習を目的とした参考資料です。用法用量・副作用等は代表的な成人例を簡略化して記載しており、実際の臨床判断・投薬には必ず最新の添付文書・院内基準・医師の指示を確認してください。
  </footer>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" role="dialog" aria-modal="true" id="sheet">
    <!-- injected -->
  </div>
</div>

<script>

// ---- render ----
const chipsEl = document.getElementById('chips');
const gridEl = document.getElementById('grid');
const searchInput = document.getElementById('searchInput');
const resultCount = document.getElementById('resultCount');
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');

let activeCategories = new Set();
let query = '';

function catInfo(id){
  return categories.find(c=>c.id===id);
}

function tint(hex){
  // produce a light tint background for badges
  return hex + '22';
}

function renderChips(){
  const all = [{id:'all', label:'すべて', emoji:'✨', color:'#4C6EF5'}, ...categories];
  chipsEl.innerHTML = all.map(c => {
    const isActive = c.id==='all' ? activeCategories.size===0 : activeCategories.has(c.id);
    return `<button class="chip ${isActive?'active':''}" style="--chip-color:${c.color}" data-cat="${c.id}">${c.emoji} ${c.label}</button>`;
  }).join('');
  chipsEl.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const cat = btn.dataset.cat;
      if(cat==='all'){
        activeCategories.clear();
      } else if(activeCategories.has(cat)){
        activeCategories.delete(cat);
      } else {
        activeCategories.add(cat);
      }
      renderChips();
      renderGrid();
    });
  });
}

function matches(drug){
  const inCat = activeCategories.size===0 || activeCategories.has(drug.category);
  if(!inCat) return false;
  if(!query) return true;
  const q = query.toLowerCase();
  const haystack = [drug.name, drug.brand, drug.classification, drug.indication].join(' ').toLowerCase();
  return haystack.includes(q);
}

function renderGrid(){
  const list = drugs.filter(matches);
  resultCount.textContent = `${list.length} 件`;
  if(list.length===0){
    gridEl.innerHTML = `<div class="empty-state"><span class="big-emoji">🔍</span><strong>該当する薬剤が見つかりません</strong>検索キーワードや分野を変えてお試しください。</div>`;
    return;
  }
  gridEl.innerHTML = list.map((d) => {
    const c = catInfo(d.category);
    const realIdx = drugs.indexOf(d);
    return `
    <button class="card" style="--tag-color:${c.color}; --tag-tint:${tint(c.color)}" data-idx="${realIdx}">
      <div class="emoji-badge">${c.emoji}</div>
      <div class="cat-label">${c.label}</div>
      <div class="name-ja">${d.name}</div>
      <div class="brand">${d.brand}</div>
    </button>`;
  }).join('');
  gridEl.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=> openDetail(parseInt(card.dataset.idx)));
  });
}

function listBlock(title, items){
  if(!items || items.length===0) return '';
  return `<h4>${title}</h4><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
}

function openDetail(idx){
  const d = drugs[idx];
  const c = catInfo(d.category);
  sheet.style.setProperty('--tag-color', c.color);
  sheet.innerHTML = `
    <div class="sheet-head">
      <button class="close-btn" id="closeBtn" aria-label="閉じる">✕</button>
      <span class="big-emoji">${c.emoji}</span>
      <div class="cat-label">${c.label}</div>
      <div class="name-ja">${d.name}</div>
      <div class="brand">${d.brand}</div>
      <span class="classification-tag">${d.classification}</span>
    </div>
    <div class="sheet-body">
      <div class="section">
        <h3>🔬 作用機序</h3>
        <p>${d.mechanism}</p>
      </div>
      <div class="section">
        <h3>🎯 主な適応</h3>
        <p>${d.indication}</p>
      </div>
      <div class="section">
        <h3>📋 用法用量(代表例)</h3>
        <div class="dosage-box">${d.dosage}</div>
      </div>
      <div class="section">
        <h3>⚠️ 主な副作用</h3>
        <div class="side-effects">${d.sideEffects.map(s=>`<span>${s}</span>`).join('')}</div>
      </div>
      <div class="section">
        <h3>👩‍⚕️ 看護のポイント</h3>
        <div class="nursing-box">
          ${listBlock('観察項目', d.observation)}
          ${listBlock('患者指導', d.guidance)}
        </div>
      </div>
    </div>
  `;
  overlay.classList.add('open');
  document.getElementById('closeBtn').addEventListener('click', closeDetail);
  document.body.style.overflow = 'hidden';
}

function closeDetail(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

overlay.addEventListener('click', (e)=>{
  if(e.target === overlay) closeDetail();
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeDetail();
});

searchInput.addEventListener('input', (e)=>{
  query = e.target.value.trim();
  renderGrid();
});

renderChips();
renderGrid();
</script>
</body>
</html>
